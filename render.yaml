services:
  - type: web
    name: intellihire-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: MONGODB_URL
        sync: false
      - key: MONGODB_DB_NAME
        value: intellihire
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://student-cybrarians.github.io"
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: REPORTS_DIR
        value: /tmp/reports
