services:
  - type: web
    name: intellihire-api
    runtime: python
    region: singapore      # closest free region to India
    plan: free
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: MONGODB_URL
        sync: false
      - key: MONGODB_DB_NAME
        value: intellihire
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://student-cybrarians.github.io"
      - key: SPACY_MODEL
        value: en_core_web_sm
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: REPORTS_DIR
        value: /tmp/reports
