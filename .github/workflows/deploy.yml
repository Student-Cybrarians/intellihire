name: Deploy IntelliHire to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy-frontend:
    name: Deploy Frontend to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Inject backend URL
        run: |
          BACKEND_URL="${{ secrets.RENDER_BACKEND_URL }}"
          if [ -n "$BACKEND_URL" ]; then
            sed -i "s|https://YOUR_RENDER_APP.onrender.com/api/v1|${BACKEND_URL}/api/v1|g" index.html
            echo "Backend URL injected: $BACKEND_URL"
          fi
          REPO_URL="https://github.com/${{ github.repository }}"
          sed -i "s|https://github.com/YOUR_GITHUB_USERNAME/intellihire|${REPO_URL}|g" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .          # deploy from repo ROOT (where index.html now lives)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-backend:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    needs: deploy-frontend
    steps:
      - name: Trigger Render hook
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -s "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" -X POST
            echo "Render deploy triggered"
          fi
