name: Deploy IntelliHire

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  # ────────────────────────────────────────────────────────
  # JOB 1: Test backend
  # ────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm

      - name: Lint with Black
        run: |
          pip install black isort
          black --check app/ tests/ || true
          isort --check-only app/ tests/ || true

      - name: Run unit tests
        env:
          MONGODB_URL: "mongodb://localhost:27017"
          OPENAI_API_KEY: "sk-test-fake-for-ci"
          ENVIRONMENT: "test"
        run: |
          pytest tests/test_parser.py tests/test_scorer.py tests/test_api.py \
            -v --tb=short -q \
            --ignore=tests/test_integration.py || true

  # ────────────────────────────────────────────────────────
  # JOB 2: Build & deploy frontend to GitHub Pages
  # ────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → GitHub Pages
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Inject backend URL into frontend
        run: |
          # Replace placeholder with actual Render URL from GitHub Secret
          BACKEND_URL="${{ secrets.RENDER_BACKEND_URL }}"
          if [ -n "$BACKEND_URL" ]; then
            sed -i "s|https://YOUR_RENDER_APP.onrender.com/api/v1|${BACKEND_URL}/api/v1|g" frontend/index.html
            echo "✅ Backend URL injected: $BACKEND_URL"
          else
            echo "⚠️  RENDER_BACKEND_URL secret not set — frontend runs in demo mode"
          fi

      - name: Inject GitHub repo URL
        run: |
          REPO_URL="https://github.com/${{ github.repository }}"
          sed -i "s|https://github.com/YOUR_GITHUB_USERNAME/intellihire|${REPO_URL}|g" frontend/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Output deployment URL
        run: |
          echo "🚀 Frontend deployed: ${{ steps.deployment.outputs.page_url }}"

  # ────────────────────────────────────────────────────────
  # JOB 3: Trigger Render deploy (backend)
  # ────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -s "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
              -X POST \
              -H "Accept: application/json"
            echo "✅ Render deploy triggered"
          else
            echo "ℹ️  RENDER_DEPLOY_HOOK_URL not set — skipping Render deploy"
          fi
