name: 🚀 Deploy IntelliHire — Full Microsoft Stack

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:

  # ── Job 1: Deploy Frontend → Azure Static Web Apps ──────
  deploy-frontend:
    name: 🌐 Frontend → Azure Static Web Apps
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.swa.outputs.static_web_app_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Inject Azure backend URL
        run: |
          URL="${{ secrets.AZURE_BACKEND_URL }}"
          if [ -n "$URL" ]; then
            sed -i "s|https://YOUR_RENDER_APP.onrender.com/api/v1|${URL}/api/v1|g" index.html
            sed -i "s|https://YOUR_AZURE_APP.azurewebsites.net/api/v1|${URL}/api/v1|g" index.html
            echo "✅ Injected backend URL: $URL"
          fi
          sed -i "s|YOUR_GITHUB_USERNAME|Student-Cybrarians|g" index.html

      - name: Deploy to Azure Static Web Apps
        id: swa
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "/"
          skip_app_build: true
          output_location: ""

  # ── Job 2: Deploy Backend → Azure App Service ───────────
  deploy-backend:
    name: ⚡ Backend → Azure App Service
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install & test
        working-directory: ./backend
        run: |
          pip install -r requirements.txt --quiet
          python -c "import fastapi, motor, pymongo, reportlab; print('✅ All packages OK')"

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./backend

  # ── Job 3: GitHub Pages fallback (if SWA not set up) ────
  deploy-pages-fallback:
    name: 📄 GitHub Pages (fallback)
    runs-on: ubuntu-latest
    if: ${{ !secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Inject backend URL
        run: |
          URL="${{ secrets.AZURE_BACKEND_URL }}"
          [ -n "$URL" ] && sed -i "s|https://YOUR_RENDER_APP.onrender.com/api/v1|${URL}/api/v1|g" index.html || true
          sed -i "s|YOUR_GITHUB_USERNAME|Student-Cybrarians|g" index.html

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: pages
        uses: actions/deploy-pages@v4
